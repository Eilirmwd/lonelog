version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  commands:
    # Crea cartella output root
    - mkdir -p $READTHEDOCS_OUTPUT/html/

    # Docsify entry point e navbar
    - cp index.html $READTHEDOCS_OUTPUT/html/
    - cp docs/_navbar.md $READTHEDOCS_OUTPUT/html/
    - cp -r assets/ $READTHEDOCS_OUTPUT/html/assets/

    # Home page
    - cp docs/README.md $READTHEDOCS_OUTPUT/html/README.md

    # Contenuto MD per lingua (strip frontmatter YAML)
    - mkdir -p $READTHEDOCS_OUTPUT/html/en/
    - mkdir -p $READTHEDOCS_OUTPUT/html/it/
    - mkdir -p $READTHEDOCS_OUTPUT/html/fr/
    - find docs/en/ -name "*.md" -exec sh -c 'sed "/^---$/,/^---$/d" "$1" > "$READTHEDOCS_OUTPUT/html/en/$(basename $1)"' _ {} \;
    - find docs/it/ -name "*.md" -exec sh -c 'sed "/^---$/,/^---$/d" "$1" > "$READTHEDOCS_OUTPUT/html/it/$(basename $1)"' _ {} \;
    - find docs/fr/ -name "*.md" -exec sh -c 'sed "/^---$/,/^---$/d" "$1" > "$READTHEDOCS_OUTPUT/html/fr/$(basename $1)"' _ {} \;

    # Render Quarto per lingua sotto /downloads/
    - mkdir -p $READTHEDOCS_OUTPUT/html/downloads/en/
    - mkdir -p $READTHEDOCS_OUTPUT/html/downloads/it/
    - mkdir -p $READTHEDOCS_OUTPUT/html/downloads/fr/
    - cp -r output/en/. $READTHEDOCS_OUTPUT/html/downloads/en/
    - cp -r output/it/. $READTHEDOCS_OUTPUT/html/downloads/it/
    - cp -r output/fr/. $READTHEDOCS_OUTPUT/html/downloads/fr/
