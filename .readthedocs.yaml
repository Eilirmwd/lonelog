version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  jobs:
    build:
      html:
        # Root output
        - mkdir -p $READTHEDOCS_OUTPUT/html/

        # Docsify entry point e assets (comuni a tutte le lingue)
        - cp index.html $READTHEDOCS_OUTPUT/html/
        - cp -r assets/ $READTHEDOCS_OUTPUT/html/assets/

        # Copia i file della lingua corrente nella root dell'output
        # RTD imposta $READTHEDOCS_LANGUAGE automaticamente (en, it, fr)
        - cp -r docs/$READTHEDOCS_LANGUAGE/. $READTHEDOCS_OUTPUT/html/

        # Downloads (PDF, ePub) per la lingua corrente
        - mkdir -p $READTHEDOCS_OUTPUT/html/downloads/
        - cp -r output/$READTHEDOCS_LANGUAGE/. $READTHEDOCS_OUTPUT/html/downloads/
